server {
    server_name judicore.com.br www.judicore.com.br;

    location /test-report/ {
        alias /opt/judicore/packages/ai/tests/report/output/;
        autoindex on;
        add_header Cache-Control "no-store";
    }

    location /api/ {
        client_max_body_size 200M;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_connect_timeout 60;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/judicore.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/judicore.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.judicore.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = judicore.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name judicore.com.br www.judicore.com.br;
    return 404; # managed by Certbot
}
